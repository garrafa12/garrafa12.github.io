<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — PartyRooms</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .dash-top{ display:flex; justify-content:space-between; align-items:center; padding: 36px 0 28px; }
  .dash-user{ display:flex; align-items:center; gap:14px; }
  .dash-avatar{
    width:52px; height:52px; border-radius:50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight:600; color:#fff; font-size:18px;
  }
  .dash-stats{ display:grid; grid-template-columns: repeat(4,1fr); gap:14px; margin-bottom: 36px; }
  .stat-card{ padding: 20px; text-align:center; }
  .stat-card .value{ font-family: var(--font-display); font-size: 24px; font-weight:600; }
  .stat-card .label{ font-size: 12px; color: var(--muted); font-family: var(--font-mono); margin-top:4px; }
  .loading-screen{ min-height: 60vh; display:flex; align-items:center; justify-content:center; color: var(--muted); }
  @media (max-width: 700px){ .dash-stats{ grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <nav>
      <a class="logo" href="index.html"><span class="dot"></span> PartyRooms</a>
      <div></div>
      <button class="btn btn-ghost" id="btnLogout">Cerrar sesión</button>
    </nav>
  </div>
</header>

<main class="wrap" id="contenido">
  <div class="loading-screen">Cargando tu perfil…</div>
</main>

<script type="module">
  import { observarSesion, cerrarSesion } from "./assets/js/auth.js";
  import { db } from "./assets/js/firebase-config.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const contenido = document.getElementById('contenido');

  observarSesion(async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }

    const snap = await getDoc(doc(db, "users", user.uid));
    const perfil = snap.exists() ? snap.data() : null;

    const iniciales = (perfil?.nombre || user.email || "??")
      .split(" ").map(p => p[0]).join("").slice(0,2).toUpperCase();

    contenido.innerHTML = `
      <div class="dash-top">
        <div class="dash-user">
          <div class="dash-avatar">${iniciales}</div>
          <div>
            <h2 style="margin-bottom:4px;">${perfil?.nombre || "Jugador"}</h2>
            <span class="muted" style="font-size:13px;">${user.email}</span>
          </div>
        </div>
      </div>

      <div class="dash-stats">
        <div class="stat-card glass">
          <div class="value">${perfil?.nivel ?? 1}</div>
          <div class="label">NIVEL</div>
        </div>
        <div class="stat-card glass">
          <div class="value">${perfil?.coins ?? 0}</div>
          <div class="label">COINS</div>
        </div>
        <div class="stat-card glass">
          <div class="value">${perfil?.gems ?? 0}</div>
          <div class="label">GEMS</div>
        </div>
        <div class="stat-card glass">
          <div class="value">${perfil?.amigos?.length ?? 0}</div>
          <div class="label">AMIGOS</div>
        </div>
      </div>

      <div class="section-head">
        <span class="eyebrow">Próximamente en tu dashboard</span>
        <h2>Salas, amigos y mercado en camino</h2>
        <p class="muted">Tu cuenta y perfil ya están funcionando de verdad. Lo que sigue: crear/unirse a salas, el primer juego jugable y el sistema de amigos.</p>
      </div>
    `;
  });

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await cerrarSesion();
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
